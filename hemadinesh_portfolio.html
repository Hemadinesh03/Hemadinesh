<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Hema Dinesh Boddeda - Aspiring Data Analyst | Python, SQL, Power BI, Machine Learning"/>
<meta name="keywords" content="data analyst, python, power bi, sql, machine learning, fresher, portfolio"/>
<title>Hema Dinesh Boddeda | Data Analyst Portfolio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.22.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --card: #14141e;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --teal: #2dd4bf;
    --amber: #f59e0b;
    --text: #f0f0f8;
    --muted: #8888aa;
    --border: rgba(108,99,255,0.18);
    --border2: rgba(255,255,255,0.06);
    --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

  /* Nav */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    background: rgba(10,10,15,0.88);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border2);
    padding: 0 2rem;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo {
    font-size: 1.1rem; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--teal));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
  }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    color: var(--muted); text-decoration: none;
    font-size: 0.85rem; font-weight: 500; letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent2); }
  .menu-btn {
    display: none; background: none; border: none;
    color: var(--text); cursor: pointer; padding: 4px;
  }
  @media(max-width:768px){
    .nav-links { display: none; }
    .menu-btn { display: block; }
    .nav-links.open {
      display: flex; flex-direction: column; gap: 0;
      position: fixed; top: 60px; left: 0; right: 0;
      background: var(--bg2); padding: 1rem 2rem 2rem;
      border-bottom: 1px solid var(--border2);
    }
    .nav-links.open a { padding: 0.75rem 0; font-size: 1rem; }
  }

  /* Sections */
  section { padding: 6rem 2rem; max-width: 1100px; margin: 0 auto; }
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem; color: var(--accent2);
    letter-spacing: 0.15em; text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  h2.section-title {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800; letter-spacing: -0.03em;
    margin-bottom: 3rem; line-height: 1.2;
  }
  h2.section-title span { color: var(--accent2); }

  /* Hero */
  #hero {
    min-height: 100vh;
    display: flex; align-items: center;
    padding-top: 80px;
    max-width: 100%;
    padding-left: 5vw; padding-right: 5vw;
  }
  .hero-inner {
    max-width: 1100px; margin: 0 auto; width: 100%;
    display: grid; grid-template-columns: 1fr auto;
    gap: 4rem; align-items: center;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(108,99,255,0.12); border: 1px solid var(--border);
    padding: 6px 16px; border-radius: 999px;
    font-size: 0.8rem; color: var(--accent2);
    margin-bottom: 1.5rem;
  }
  .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  h1.hero-name {
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 900; letter-spacing: -0.04em; line-height: 1.05;
    margin-bottom: 0.5rem;
  }
  h1.hero-name .grd {
    background: linear-gradient(135deg, var(--accent) 0%, var(--teal) 60%, var(--amber) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero-title {
    font-size: clamp(1rem, 2.5vw, 1.35rem);
    color: var(--muted); font-weight: 400;
    margin-bottom: 1.25rem;
  }
  .typing-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; }
  .typing-prefix { color: var(--muted); font-size: 0.95rem; }
  .typing-text { color: var(--accent2); font-weight: 600; font-size: 0.95rem; }
  .cursor { display: inline-block; width: 2px; height: 1.1em; background: var(--accent2); margin-left: 2px; vertical-align: text-bottom; animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .hero-desc { color: var(--muted); max-width: 520px; margin-bottom: 2.5rem; font-size: 0.95rem; line-height: 1.8; }
  .hero-btns { display: flex; flex-wrap: wrap; gap: 1rem; }
  .btn-primary {
    background: var(--accent); color: #fff;
    padding: 0.75rem 1.75rem; border-radius: 8px;
    font-weight: 600; font-size: 0.9rem; text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    border: none; cursor: pointer; display: inline-block;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,99,255,0.35); }
  .btn-outline {
    background: transparent; color: var(--text);
    border: 1px solid var(--border2);
    padding: 0.75rem 1.75rem; border-radius: 8px;
    font-weight: 500; font-size: 0.9rem; text-decoration: none;
    transition: border-color 0.2s, color 0.2s; cursor: pointer;
    display: inline-block;
  }
  .btn-outline:hover { border-color: var(--accent2); color: var(--accent2); }
  .hero-stats {
    display: flex; gap: 2rem; margin-top: 3rem;
    padding-top: 2rem; border-top: 1px solid var(--border2);
  }
  .stat-item { text-align: left; }
  .stat-num { font-size: 1.6rem; font-weight: 800; color: var(--accent2); display: block; letter-spacing: -0.03em; }
  .stat-lbl { font-size: 0.78rem; color: var(--muted); }

  /* Avatar */
  .hero-avatar {
    width: 260px; height: 260px;
    border-radius: 24px;
    background: linear-gradient(135deg, rgba(108,99,255,0.25), rgba(45,212,191,0.15));
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    position: relative; overflow: hidden;
  }
  .avatar-initials {
    font-size: 3.5rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--teal));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .avatar-ring {
    position: absolute; inset: -12px;
    border-radius: 32px;
    border: 1px solid rgba(108,99,255,0.15);
  }
  @media(max-width:768px){
    .hero-inner { grid-template-columns: 1fr; text-align: center; }
    .hero-btns { justify-content: center; }
    .hero-stats { justify-content: center; }
    .hero-avatar { width: 160px; height: 160px; margin: 0 auto; border-radius: 16px; }
    .avatar-initials { font-size: 2.2rem; }
    .hero-desc { margin: 0 auto 2.5rem; }
  }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    padding: 1.5rem;
    transition: border-color 0.2s, transform 0.2s;
  }
  .card:hover { border-color: var(--border); transform: translateY(-3px); }

  /* About */
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
  @media(max-width:700px){ .about-grid { grid-template-columns: 1fr; } }
  .edu-item { margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border2); }
  .edu-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .edu-degree { font-weight: 700; font-size: 0.95rem; color: var(--text); }
  .edu-school { font-size: 0.85rem; color: var(--muted); margin: 2px 0; }
  .edu-score { font-size: 0.8rem; color: var(--teal); font-family: 'JetBrains Mono', monospace; }

  /* Skills */
  .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.25rem; }
  .skill-cat-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1rem; font-weight: 600; }
  .skill-item { margin-bottom: 1rem; }
  .skill-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .skill-name { font-size: 0.88rem; color: var(--text); }
  .skill-pct { font-size: 0.78rem; color: var(--accent2); font-family: 'JetBrains Mono', monospace; }
  .skill-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; }
  .skill-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--teal)); transform-origin: left; transition: transform 1.2s cubic-bezier(0.16,1,0.3,1); }

  /* Projects */
  .projects-filter { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 2rem; }
  .filter-btn {
    padding: 6px 16px; border-radius: 99px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--muted); font-size: 0.8rem; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: var(--accent2); background: rgba(108,99,255,0.1); }
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
  .proj-img {
    height: 160px; border-radius: 8px; margin-bottom: 1.25rem;
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem; position: relative; overflow: hidden;
  }
  .proj-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 1rem 0; }
  .tag {
    font-size: 0.72rem; padding: 3px 10px; border-radius: 99px;
    background: rgba(108,99,255,0.12); color: var(--accent2);
    border: 1px solid rgba(108,99,255,0.2);
  }
  .proj-links { display: flex; gap: 1rem; margin-top: 1rem; }
  .proj-link {
    font-size: 0.8rem; color: var(--muted); text-decoration: none;
    display: flex; align-items: center; gap: 4px;
    transition: color 0.2s;
  }
  .proj-link:hover { color: var(--accent2); }

  /* Certifications */
  .certs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.25rem; }
  .cert-icon { font-size: 1.5rem; margin-bottom: 0.75rem; }
  .cert-title { font-size: 0.9rem; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .cert-by { font-size: 0.8rem; color: var(--muted); }
  .cert-date { font-size: 0.75rem; color: var(--teal); font-family: 'JetBrains Mono', monospace; margin-top: 6px; }

  /* Experience */
  .timeline { position: relative; padding-left: 1.5rem; }
  .timeline::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 0; width: 1px; background: var(--border2); }
  .timeline-item { position: relative; margin-bottom: 2.5rem; }
  .timeline-dot {
    position: absolute; left: -1.5rem; top: 6px;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--bg);
    transform: translateX(-4px);
  }
  .timeline-period { font-size: 0.75rem; color: var(--teal); font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; }
  .timeline-role { font-size: 1rem; font-weight: 700; color: var(--text); }
  .timeline-company { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.75rem; }
  .timeline-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.8; }

  /* Contact */
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
  @media(max-width:700px){ .contact-grid { grid-template-columns: 1fr; } }
  .contact-info-item { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
  .contact-icon { width: 44px; height: 44px; border-radius: 10px; background: rgba(108,99,255,0.12); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
  .contact-lbl { font-size: 0.75rem; color: var(--muted); }
  .contact-val { font-size: 0.9rem; color: var(--text); text-decoration: none; }
  .contact-val:hover { color: var(--accent2); }
  .form-group { margin-bottom: 1.25rem; }
  .form-label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
  .form-input {
    width: 100%; padding: 0.75rem 1rem;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--text); font-size: 0.9rem; font-family: inherit;
    transition: border-color 0.2s; outline: none;
  }
  .form-input:focus { border-color: var(--accent); }
  textarea.form-input { resize: vertical; min-height: 120px; }

  /* Footer */
  footer {
    border-top: 1px solid var(--border2);
    padding: 2rem 5vw;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
  }
  .footer-copy { font-size: 0.82rem; color: var(--muted); }
  .social-links { display: flex; gap: 1rem; }
  .social-link {
    width: 36px; height: 36px; border-radius: 8px;
    border: 1px solid var(--border2); background: transparent;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); text-decoration: none; font-size: 0.9rem;
    transition: border-color 0.2s, color 0.2s;
  }
  .social-link:hover { border-color: var(--accent); color: var(--accent2); }

  /* Scroll top */
  .scroll-top {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 99;
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--accent); border: none; color: #fff;
    font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, opacity 0.3s;
    opacity: 0; pointer-events: none;
  }
  .scroll-top.visible { opacity: 1; pointer-events: auto; }
  .scroll-top:hover { transform: translateY(-3px); }

  /* Divider */
  .divider { height: 1px; background: var(--border2); margin: 0 5vw; }

  /* Theme toggle */
  .theme-btn {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 8px; width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); cursor: pointer; font-size: 1rem;
    transition: border-color 0.2s; flex-shrink: 0;
  }
  .theme-btn:hover { border-color: var(--accent2); }

  /* Light theme */
  body.light {
    --bg: #f8f8fc; --bg2: #efeffa; --bg3: #e8e8f5;
    --card: #ffffff; --text: #0f0f1a; --muted: #5a5a78;
    --border: rgba(108,99,255,0.22); --border2: rgba(0,0,0,0.08);
  }

  /* Animations */
  .fade-in { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .fade-in.visible { opacity: 1; transform: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TYPING_WORDS = ["Data Analyst", "Power BI Developer", "Python Enthusiast", "ML Explorer", "Dashboard Builder"];

const SKILLS = [
  { cat: "Data & Analytics", items: [
    { name: "Power BI", pct: 85 }, { name: "Microsoft Excel", pct: 80 },
    { name: "Exploratory Data Analysis", pct: 78 }, { name: "Data Wrangling", pct: 75 },
  ]},
  { cat: "Programming", items: [
    { name: "Python", pct: 80 }, { name: "Pandas / NumPy", pct: 75 },
    { name: "Scikit-learn", pct: 65 }, { name: "SQL", pct: 70 },
  ]},
  { cat: "Visualization", items: [
    { name: "Power BI Dashboards", pct: 85 }, { name: "DAX & Power Query", pct: 78 },
    { name: "Matplotlib / Seaborn", pct: 68 }, { name: "Jupyter Notebook", pct: 80 },
  ]},
  { cat: "Concepts", items: [
    { name: "Machine Learning Basics", pct: 65 }, { name: "Basic Statistics", pct: 72 },
    { name: "Feature Engineering", pct: 68 }, { name: "MS Office Suite", pct: 85 },
  ]},
];

const PROJECTS = [
  {
    title: "UPI Fraud Detection using ML",
    desc: "Built a machine learning model to detect fraudulent UPI transactions. Involved data preprocessing, feature engineering, and classification algorithms achieving high accuracy and F1-score.",
    tags: ["Python", "Scikit-learn", "Pandas", "ML", "Classification"],
    emoji: "🔐",
    gradient: "linear-gradient(135deg, rgba(108,99,255,0.3), rgba(45,212,191,0.15))",
    filter: "ML",
  },
  {
    title: "Global Weather Data Dashboard",
    desc: "Designed interactive Power BI dashboards to analyze global weather trends. Used Power Query for ETL, DAX for KPIs, and built maps, bar charts, and line charts for data storytelling.",
    tags: ["Power BI", "DAX", "Power Query", "Data Viz"],
    emoji: "🌍",
    gradient: "linear-gradient(135deg, rgba(45,212,191,0.3), rgba(245,158,11,0.15))",
    filter: "Power BI",
  },
];

const CERTS = [
  { title: "Data Visualization Internship", by: "Infosys 6.0", date: "May 2026", emoji: "📊" },
  { title: "Data Analytics with Python & Power BI", by: "Eduskills", date: "Mar 2026", emoji: "🐍" },
  { title: "Python for Data Science", by: "NPTEL", date: "Dec 2024", emoji: "🏛️" },
  { title: "Data Analysis Using Python", by: "Online", date: "Jun 2025", emoji: "📈" },
  { title: "Machine Learning for All", by: "Coursera", date: "May 2024", emoji: "🤖" },
  { title: "Software Engineering & Agile", by: "Infosys Springboard", date: "Jul 2024", emoji: "⚙️" },
];

function useInView(ref) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if(e.isIntersecting) setVisible(true); }, { threshold: 0.1 });
    if(ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return visible;
}

function SkillBar({ name, pct, visible }) {
  return (
    <div className="skill-item">
      <div className="skill-row">
        <span className="skill-name">{name}</span>
        <span className="skill-pct">{pct}%</span>
      </div>
      <div className="skill-bar">
        <div className="skill-fill" style={{ transform: visible ? `scaleX(${pct/100})` : 'scaleX(0)' }} />
      </div>
    </div>
  );
}

function Nav({ light, setLight }) {
  const [open, setOpen] = useState(false);
  const links = ["About","Skills","Projects","Experience","Certifications","Contact"];
  return (
    <nav>
      <span className="nav-logo">HD.</span>
      <ul className={`nav-links${open?' open':''}`}>
        {links.map(l => (
          <li key={l}><a href={`#${l.toLowerCase()}`} onClick={()=>setOpen(false)}>{l}</a></li>
        ))}
      </ul>
      <div style={{display:'flex',gap:'0.5rem',alignItems:'center'}}>
        <button className="theme-btn" onClick={()=>setLight(p=>!p)} title="Toggle theme">
          {light ? '🌙' : '☀️'}
        </button>
        <button className="menu-btn" onClick={()=>setOpen(p=>!p)} aria-label="Toggle menu">
          {open ? '✕' : '☰'}
        </button>
      </div>
    </nav>
  );
}

function Hero() {
  const [wordIdx, setWordIdx] = useState(0);
  const [displayed, setDisplayed] = useState('');
  const [deleting, setDeleting] = useState(false);

  useEffect(() => {
    const word = TYPING_WORDS[wordIdx];
    let timeout;
    if (!deleting && displayed.length < word.length) {
      timeout = setTimeout(() => setDisplayed(word.slice(0, displayed.length + 1)), 90);
    } else if (!deleting && displayed.length === word.length) {
      timeout = setTimeout(() => setDeleting(true), 1800);
    } else if (deleting && displayed.length > 0) {
      timeout = setTimeout(() => setDisplayed(displayed.slice(0, -1)), 50);
    } else if (deleting && displayed.length === 0) {
      setDeleting(false);
      setWordIdx(i => (i + 1) % TYPING_WORDS.length);
    }
    return () => clearTimeout(timeout);
  }, [displayed, deleting, wordIdx]);

  return (
    <section id="hero">
      <div className="hero-inner">
        <div>
          <div className="hero-badge">
            <span className="badge-dot"/>
            Open to Data Analyst Roles
          </div>
          <h1 className="hero-name">
            <span className="grd">Hema Dinesh</span><br/>Boddeda
          </h1>
          <p className="hero-title">Aspiring Data Analyst &amp; Power BI Developer</p>
          <div className="typing-wrap">
            <span className="typing-prefix">I build →</span>
            <span className="typing-text">{displayed}<span className="cursor"/></span>
          </div>
          <p className="hero-desc">
            Final-year B.Tech (CSE - Data Science) student who turns raw datasets into clear, 
            actionable insights through Python, SQL, and Power BI dashboards. 
            Currently seeking entry-level Data Analyst roles.
          </p>
          <div className="hero-btns">
            <a href="#projects" className="btn-primary">View Projects</a>
            <a href="#contact" className="btn-outline">Contact Me</a>

function App() {
  const [light, setLight] = useState(false);
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    document.body.className = light ? 'light' : '';
  }, [light]);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 300);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <>
      <Nav light={light} setLight={setLight}/>
      <main>
        <Hero/>
        <div className="divider"/>
        <About/>
        <Skills/>
        <Projects/>
        <Experience/>
        <Certifications/>
        <Contact/>
      </main>
      <footer>
        <span className="footer-copy">© 2026 Hema Dinesh Boddeda. Built with ❤️ and data.</span>
        <div className="social-links">
          <a href="mailto:bhemadinesh@gmail.com" className="social-link" title="Email">✉</a>
          <a href="https://www.linkedin.com/in/hema-dinesh-boddeda" className="social-link" target="_blank" rel="noopener" title="LinkedIn">in</a>
          <a href="https://github.com" className="social-link" target="_blank" rel="noopener" title="GitHub">⬡</a>
        </div>
      </footer>
      <button className={`scroll-top${scrolled?' visible':''}`} onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} title="Back to top">↑</button>
    </>
  );
}
